<!DOCTYPE html>
<html>
<head>
<title>FilmGenie 🎬</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0b0014;
    color:white;
}

/* HEADER */
header {
    padding:20px 40px;
    font-size:28px;
    font-weight:bold;
    color:#c084fc;
}

/* SEARCH */
.search-bar {
    text-align:center;
    margin:20px;
}

.search-bar input {
    width:350px;
    padding:14px;
    border-radius:30px;
    border:none;
    background:#1a1a1a;
    color:white;
}

.search-bar button {
    padding:12px 16px;
    border:none;
    background:#7b2ff7;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

/* FILTERS */
.filters {
    text-align:center;
    margin-bottom:20px;
}

.filters button {
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#2a004d;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.filters button:hover {
    background:#7b2ff7;
}

/* GRID */
.results {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card {
    position:relative;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card img {
    width:100%;
    height:270px;
    object-fit:cover;
}

.card:hover {
    transform:scale(1.08);
}

/* OVERLAY */
.overlay {
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding:10px;
    opacity:0;
    transition:0.3s;
}

.card:hover .overlay {
    opacity:1;
}

.overlay h3 {
    font-size:14px;
    margin:5px 0;
}

.overlay button {
    margin:3px;
    padding:5px 8px;
    font-size:12px;
    border:none;
    border-radius:5px;
    background:#7b2ff7;
    color:white;
    cursor:pointer;
}

/* MODAL */
#movieModal {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#140026;
    padding:20px;
    border-radius:12px;
    width:400px;
}

/* CHAT */
#aiChatBox {
    position:fixed;
    bottom:80px;
    right:20px;
    width:300px;
    height:300px;
    overflow:auto;
    background:#140026;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🎬 FilmGenie</header>

<div class="search-bar">
<input id="sceneInput" placeholder="Search movies...">
<button onclick="scene()">Search</button>
<button onclick="mlRecommend()">🎯 Similar</button>
<button onclick="smart()">🧠 Smart</button>
</div>

<div class="filters">
<button onclick="mood('happy')">😊 Happy</button>
<button onclick="mood('sad')">😢 Sad</button>
<button onclick="mood('romantic')">❤️ Romantic</button>
<button onclick="mood('action')">🔥 Action</button>
<button onclick="surprise()">🎲 Surprise</button>
<button onclick="showWatchlist()">❤️ Watchlist</button>
</div>

<div id="results" class="results"></div>

<!-- MODAL -->
<div id="movieModal">
<div class="modal-box">
<h2 id="modalTitle"></h2>
<p id="modalOverview"></p>
<p id="modalRating"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- CHAT -->
<div id="aiChatBox"></div>

<input id="aiInput" placeholder="Ask AI..."
style="position:fixed;bottom:20px;right:20px;width:200px;padding:10px;background:#1a1a1a;color:white;border:none;">

<button onclick="askAI()" 
style="position:fixed;bottom:20px;right:230px;background:#7b2ff7;border:none;color:white;padding:10px;">
Send
</button>

<script>

const API="https://filmgenie-fr1z.onrender.com";

let currentMovies=[];

/* POSTER */
async function getPoster(title){
    try{
        let res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=6701680a60181e103f2b432a7e39663c&query=${encodeURIComponent(title)}`);
        let data=await res.json();
        if(data.results && data.results[0].poster_path){
            return "https://image.tmdb.org/t/p/w500"+data.results[0].poster_path;
        }
    }catch{}
    return "";
}

/* DISPLAY */
async function display(data){
    let div=document.getElementById("results");
    div.innerHTML="";
    currentMovies=data;

    for(let i=0;i<data.length;i++){
        let m=data[i];
        let poster=await getPoster(m.title);

        div.innerHTML+=`
        <div class="card">
            <img src="${poster}" onclick="showDetails(${i})">

            <div class="overlay">
                <h3>${m.title}</h3>
                <button onclick="toggleWatchlist(${i})">❤️</button>
                <button onclick="showDetails(${i})">ℹ️</button>
            </div>
        </div>`;
    }
}

/* MODAL */
function showDetails(i){
    let m=currentMovies[i];
    modalTitle.innerText=m.title;
    modalOverview.innerText=m.overview||"No description";
    modalRating.innerText="⭐ "+(m.vote_average||"N/A");
    movieModal.style.display="flex";
}
function closeModal(){movieModal.style.display="none";}

/* WATCHLIST */
function toggleWatchlist(i){
    let movie=currentMovies[i];
    let list=JSON.parse(localStorage.getItem("watchlist"))||[];

    let exists=list.find(m=>m.id===movie.id);

    if(exists){
        list=list.filter(m=>m.id!==movie.id);
        alert("Removed ❌");
    } else {
        list.push(movie);
        alert("Added ❤️");
    }

    localStorage.setItem("watchlist",JSON.stringify(list));
}

/* WATCHLIST VIEW */
function showWatchlist(){
    let list=JSON.parse(localStorage.getItem("watchlist"))||[];
    display(list);
}

/* API CALLS */
async function scene(){
    let val=sceneInput.value;
    let res=await fetch(API+"/recommend?q="+val);
    display(await res.json());
}

async function mood(type){
    let res=await fetch(API+"/mood?mood="+type);
    display(await res.json());
}

async function surprise(){
    let res=await fetch(API+"/recommend?q=random");
    display(await res.json());
}

async function smart(){
    let res=await fetch(API+"/smart");
    display(await res.json());
}

async function mlRecommend(){
    let val=sceneInput.value;
    let res=await fetch(API+"/ml?name="+val);
    display(await res.json());
}

/* CHAT */
function addMsg(s,t){
    aiChatBox.innerHTML+=`<p><b>${s}:</b> ${t}</p>`;
}

async function askAI(){
    let input=aiInput.value;
    addMsg("You",input);

    let res=await fetch(API+"/recommend?q="+input);
    display(await res.json());
}

</script>

</body>
</html>
