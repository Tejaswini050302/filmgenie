<!DOCTYPE html>
<html>
<head>
<title>FilmGenie 🎬</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0b0014;
    color:white;
}

header {
    padding:20px 40px;
    font-size:28px;
    color:#c084fc;
}

.search-bar {
    text-align:center;
    margin:20px;
}

.search-bar input {
    width:350px;
    padding:14px;
    border-radius:30px;
    border:none;
    background:#1a1a1a;
    color:white;
}

.search-bar button {
    padding:10px;
    border:none;
    border-radius:20px;
    background:#7b2ff7;
    color:white;
    cursor:pointer;
}

.filters {
    text-align:center;
}

.filters button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#2a004d;
    color:white;
    cursor:pointer;
}

.results {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    position:relative;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card img {
    width:100%;
    height:270px;
    object-fit:cover;
}

.card:hover {
    transform:scale(1.08);
}

.overlay {
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
    opacity:0;
    transition:0.3s;
    padding:10px;
}

.card:hover .overlay {
    opacity:1;
}

.overlay button {
    margin:3px;
    padding:5px;
    background:#7b2ff7;
    border:none;
    color:white;
    border-radius:5px;
}

/* MODAL */
#movieModal {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#140026;
    padding:20px;
    border-radius:12px;
    width:400px;
}

/* CHAT */
#aiChatBox {
    position:fixed;
    bottom:80px;
    right:20px;
    width:300px;
    height:300px;
    overflow:auto;
    background:#140026;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🎬 FilmGenie</header>

<div class="search-bar">
<input id="sceneInput" placeholder="Search movies...">
<button onclick="scene()">Search</button>
<button onclick="mlRecommend()">🎯 Similar</button>
<button onclick="smart()">🧠 Smart</button>
</div>

<div class="filters">
<button onclick="mood('happy')">😊 Happy</button>
<button onclick="mood('sad')">😢 Sad</button>
<button onclick="mood('romantic')">❤️ Romantic</button>
<button onclick="mood('action')">🔥 Action</button>
<button onclick="surprise()">🎲 Surprise</button>
<button onclick="showWatchlist()">❤️ Watchlist</button>
</div>

<div id="results" class="results"></div>

<!-- MODAL WITH TRAILER + REVIEWS -->
<div id="movieModal">
<div class="modal-box">

<h2 id="modalTitle"></h2>

<iframe id="trailer" width="100%" height="200"></iframe>

<p id="modalOverview"></p>
<p id="modalRating"></p>

<h4>⭐ Reviews</h4>
<div id="reviews" style="max-height:120px;overflow:auto;"></div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<!-- CHAT -->
<div id="aiChatBox"></div>

<input id="aiInput" placeholder="Ask AI..."
style="position:fixed;bottom:20px;right:20px;width:200px;padding:10px;background:#1a1a1a;color:white;border:none;">

<button onclick="askAI()" 
style="position:fixed;bottom:20px;right:230px;background:#7b2ff7;border:none;color:white;padding:10px;">
Send
</button>

<script>

const API="https://filmgenie-fr1z.onrender.com";
let currentMovies=[];

/* POSTER */
async function getPoster(title){
    try{
        let res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=6701680a60181e103f2b432a7e39663c&query=${encodeURIComponent(title)}`);
        let data=await res.json();
        if(data.results && data.results[0].poster_path){
            return "https://image.tmdb.org/t/p/w500"+data.results[0].poster_path;
        }
    }catch{}
    return "";
}

/* DISPLAY */
async function display(data){
    let div=document.getElementById("results");
    div.innerHTML="";
    currentMovies=data;

    for(let i=0;i<data.length;i++){
        let m=data[i];
        let poster=await getPoster(m.title);

        div.innerHTML+=`
        <div class="card">
            <img src="${poster}" onclick="showDetails(${i})">
            <div class="overlay">
                <button onclick="toggleWatchlist(${i})">❤️</button>
                <button onclick="showDetails(${i})">ℹ️</button>
            </div>
        </div>`;
    }
}

/* TRAILER */
async function getTrailer(title){
    try{
        let s=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=6701680a60181e103f2b432a7e39663c&query=${encodeURIComponent(title)}`);
        let sd=await s.json();
        if(!sd.results.length) return "";

        let id=sd.results[0].id;

        let v=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=6701680a60181e103f2b432a7e39663c`);
        let vd=await v.json();

        let t=vd.results.find(x=>x.type==="Trailer");
        if(t) return "https://www.youtube.com/embed/"+t.key;
    }catch{}

    return "";
}

/* REVIEWS */
async function getReviews(title){
    try{
        let s=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=6701680a60181e103f2b432a7e39663c&query=${encodeURIComponent(title)}`);
        let sd=await s.json();
        if(!sd.results.length) return [];

        let id=sd.results[0].id;

        let r=await fetch(`https://api.themoviedb.org/3/movie/${id}/reviews?api_key=6701680a60181e103f2b432a7e39663c`);
        let rd=await r.json();

        return rd.results.slice(0,3);
    }catch{}

    return [];
}

/* DETAILS */
async function showDetails(i){
    let m=currentMovies[i];

    modalTitle.innerText=m.title;
    modalOverview.innerText=m.overview||"No description";
    modalRating.innerText="⭐ "+(m.vote_average||"N/A");

    movieModal.style.display="flex";

    let trailer=await getTrailer(m.title);
    document.getElementById("trailer").src=trailer;

    let reviews=await getReviews(m.title);
    let div=document.getElementById("reviews");
    div.innerHTML="";

    if(!reviews.length){
        div.innerHTML="<p>No reviews</p>";
    } else {
        reviews.forEach(r=>{
            div.innerHTML+=`<p><b>${r.author}</b>: ${r.content.substring(0,100)}...</p>`;
        });
    }
}

function closeModal(){
    movieModal.style.display="none";
    document.getElementById("trailer").src="";
}

/* WATCHLIST */
function toggleWatchlist(i){
    let movie=currentMovies[i];
    let list=JSON.parse(localStorage.getItem("watchlist"))||[];

    let exists=list.find(m=>m.id===movie.id);

    if(exists){
        list=list.filter(m=>m.id!==movie.id);
        alert("Removed ❌");
    } else {
        list.push(movie);
        alert("Added ❤️");
    }

    localStorage.setItem("watchlist",JSON.stringify(list));
}

function showWatchlist(){
    let list=JSON.parse(localStorage.getItem("watchlist"))||[];
    display(list);
}

/* API */
async function scene(){
    let res=await fetch(API+"/recommend?q="+sceneInput.value);
    display(await res.json());
}

async function mood(type){
    let res=await fetch(API+"/mood?mood="+type);
    display(await res.json());
}

async function surprise(){
    let res=await fetch(API+"/recommend?q=random");
    display(await res.json());
}

async function smart(){
    let res=await fetch(API+"/smart");
    display(await res.json());
}

async function mlRecommend(){
    let res=await fetch(API+"/ml?name="+sceneInput.value);
    display(await res.json());
}

/* CHAT */
function addMsg(s,t){
    aiChatBox.innerHTML+=`<p><b>${s}:</b> ${t}</p>`;
}

async function askAI(){
    let input=aiInput.value;
    addMsg("You",input);

    let res=await fetch(API+"/recommend?q="+input);
    display(await res.json());
}

</script>

</body>
</html>
