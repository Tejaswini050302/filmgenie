<script>

const API = "https://filmgenie-fr1z.onrender.com";

function display(data){
    let div=document.getElementById("results");
    div.innerHTML="";
    data.forEach(m=>{
        div.innerHTML+=`<div class="card">
        <h3>${m.title}</h3>
        <p>${m.overview || ""}</p>
        </div>`;
    });
}

// SCENE (uses /recommend)
async function scene(){
    let val=document.getElementById("sceneInput").value;
    let res=await fetch(`${API}/recommend?q=${val}`);
    display(await res.json());
}

// MOOD
async function mood(){
    let val=document.getElementById("moodInput").value;
    let res=await fetch(`${API}/mood?mood=${val}`);
    display(await res.json());
}

// PERSONALITY (temporary uses recommend)
async function personality(){
    let val=document.getElementById("scoreInput").value;
    let res=await fetch(`${API}/recommend?q=${val}`);
    display(await res.json());
}

// SURPRISE
async function surprise(){
    let res=await fetch(`${API}/surprise`);
    display(await res.json());
}

// CHATBOT
async function chat(){
    let input=document.getElementById("chatInput").value;
    let res=await fetch(`${API}/chat?msg=${input}`);
    let data=await res.json();

    document.getElementById("chatBox").innerHTML=
    "<b>You:</b> "+input+"<br><b>FilmGenie:</b> "+data.reply;
}

</script>
