<!DOCTYPE html>
<html>
<head>
<title>FilmGenie 🎬</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background: linear-gradient(135deg,#0a0014,#1a0033,#2d0059);
    color:white;
}

header {
    text-align:center;
    padding:20px;
    font-size:28px;
    color:#c084fc;
}

.box {
    background:#140026;
    padding:20px;
    margin:20px auto;
    width:320px;
    border-radius:12px;
    text-align:center;
}

input {
    padding:10px;
    width:90%;
    margin:10px;
    background:#1a1a1a;
    color:white;
    border:none;
}

button {
    padding:10px;
    background:#7b2ff7;
    color:white;
    border:none;
    cursor:pointer;
}

.results {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#1e0033;
    margin:10px;
    padding:10px;
    width:200px;
}

#chatBox {
    position:fixed;
    bottom:80px;
    right:20px;
    width:250px;
    background:#140026;
    padding:10px;
}
</style>
</head>

<body>

<header>🎬 FilmGenie</header>

<div class="box">
<input id="sceneInput" placeholder="Describe scene">
<button onclick="scene()">Scene</button>
</div>

<div class="box">
<input id="moodInput" placeholder="Mood">
<button onclick="mood()">Mood</button>
</div>

<div class="box">
<input id="scoreInput" placeholder="Anything (personality)">
<button onclick="personality()">Personality</button>
</div>

<div class="box">
<button onclick="surprise()">Surprise</button>
</div>

<div id="results" class="results"></div>

<!-- Chatbot -->
<div id="chatBox"></div>
<input id="chatInput" style="position:fixed;bottom:20px;right:20px;">
<button onclick="chat()" style="position:fixed;bottom:20px;right:200px;">Send</button>

<script>

const API = "https://filmgenie-fr1z.onrender.com";

function display(data){
    let div=document.getElementById("results");
    div.innerHTML="";

    if(!data || data.length===0){
        div.innerHTML="<p>No results found</p>";
        return;
    }

    data.forEach(m=>{
        div.innerHTML+=`<div class="card">
        <h3>${m.title}</h3>
        <p>${m.overview || "No description"}</p>
        </div>`;
    });
}

// SCENE
async function scene(){
    let val=document.getElementById("sceneInput").value;
    let res=await fetch(`${API}/recommend?q=${val}`);
    let data=await res.json();
    display(data);
}

// MOOD
async function mood(){
    let val=document.getElementById("moodInput").value;
    let res=await fetch(`${API}/mood?mood=${val}`);
    let data=await res.json();
    display(data);
}

// PERSONALITY
async function personality(){
    let val=document.getElementById("scoreInput").value;
    let res=await fetch(`${API}/recommend?q=${val}`);
    let data=await res.json();
    display(data);
}

// SURPRISE
async function surprise(){
    let res=await fetch(`${API}/surprise`);
    let data=await res.json();
    display(data);
}

// CHAT
async function chat(){
    let input=document.getElementById("chatInput").value;
    let res=await fetch(`${API}/chat?msg=${input}`);
    let data=await res.json();

    document.getElementById("chatBox").innerHTML =
    "<b>You:</b> "+input+"<br><b>FilmGenie:</b> "+data.reply;
}

</script>

</body>
</html>
