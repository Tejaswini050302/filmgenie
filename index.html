<!DOCTYPE html>
<html>
<head>
<title>FilmGenie 🎬</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0a0014,#140026,#1f003d);
    color:white;
}

header {
    text-align:center;
    padding:20px;
    font-size:28px;
    color:#c084fc;
}

.search-bar { text-align:center; }

.search-bar input {
    width:300px;
    padding:12px;
    border-radius:20px;
    border:none;
    background:#1a1a1a;
    color:white;
}

.search-bar button {
    padding:12px;
    background:#7b2ff7;
    border:none;
    color:white;
    border-radius:20px;
}

.filters {
    text-align:center;
    margin:20px;
}

.filters button {
    margin:5px;
    padding:10px;
    background:#2a004d;
    border:none;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.results {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#1e0033;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover { transform:scale(1.05); }

.card img {
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-content { padding:10px; }

button {
    background:#7b2ff7;
    border:none;
    padding:8px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.selected { background:#c084fc !important; }

/* MODALS */
#movieModal, #quizModal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#140026;
    padding:20px;
    border-radius:12px;
    width:350px;
}

/* AI CHAT */
#aiChatBox {
    position:fixed;
    bottom:80px;
    right:20px;
    width:300px;
    height:300px;
    overflow:auto;
    background:#140026;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>🎬 FilmGenie</header>

<div class="search-bar">
<input id="sceneInput" placeholder="Search movies...">
<button onclick="scene()">Search</button>
</div>

<div class="filters">
<button onclick="mood('happy')">😊 Happy</button>
<button onclick="mood('sad')">😢 Sad</button>
<button onclick="mood('romantic')">❤️ Romantic</button>
<button onclick="mood('action')">🔥 Action</button>
<button onclick="surprise()">🎲 Surprise</button>
<button onclick="showWatchlist()">❤️ Watchlist</button>
<button onclick="openQuiz()">🧠 Quiz</button>
</div>

<div id="results" class="results"></div>

<!-- MOVIE MODAL -->
<div id="movieModal">
<div class="modal-box">
<h2 id="modalTitle"></h2>
<p id="modalOverview"></p>
<p id="modalRating"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- QUIZ -->
<div id="quizModal">
<div class="modal-box">

<h2>Personality Quiz 🧠</h2>

<p>1. Your vibe?</p>
<button onclick="selectOption(1,2,this)">Calm</button>
<button onclick="selectOption(1,5,this)">Fun</button>
<button onclick="selectOption(1,8,this)">Intense</button>

<p>2. Weekend?</p>
<button onclick="selectOption(2,2,this)">Home</button>
<button onclick="selectOption(2,5,this)">Friends</button>
<button onclick="selectOption(2,8,this)">Adventure</button>

<p>3. Genre?</p>
<button onclick="selectOption(3,2,this)">Romance</button>
<button onclick="selectOption(3,5,this)">Comedy</button>
<button onclick="selectOption(3,8,this)">Action</button>

<p>4. Setting?</p>
<button onclick="selectOption(4,2,this)">City</button>
<button onclick="selectOption(4,5,this)">Beach</button>
<button onclick="selectOption(4,8,this)">War</button>

<p>5. Character?</p>
<button onclick="selectOption(5,2,this)">Lover</button>
<button onclick="selectOption(5,5,this)">Funny</button>
<button onclick="selectOption(5,8,this)">Hero</button>

<br><br>
<button onclick="submitQuiz()">Get Movies 🎬</button>
<button onclick="closeQuiz()">Close</button>

<div id="personalityResult"></div>

</div>
</div>

<!-- AI CHAT -->
<div id="aiChatBox"></div>

<input id="aiInput" placeholder="Ask FilmGenie AI..."
style="position:fixed;bottom:20px;right:20px;width:200px;padding:10px;background:#1a1a1a;color:white;border:none;">

<button onclick="askAI()" 
style="position:fixed;bottom:20px;right:230px;background:#7b2ff7;border:none;color:white;padding:10px;">
Send
</button>

<script>

const API="https://filmgenie-fr1z.onrender.com";

let currentMovies=[];
let answers={};

// DISPLAY
function display(data){
    let div=document.getElementById("results");
    div.innerHTML="";
    currentMovies=data;

    data.forEach((m,i)=>{
        div.innerHTML+=`
        <div class="card" onclick="showDetails(${i})">
            <div class="card-content">
                <h3>${m.title}</h3>
                <p>⭐ ${m.vote_average||"N/A"}</p>

                <button onclick="event.stopPropagation(); toggleWatchlist(${i})">
                ❤️ Wishlist
                </button>
            </div>
        </div>`;
    });
}

// DETAILS
function showDetails(i){
    let m=currentMovies[i];
    modalTitle.innerText=m.title;
    modalOverview.innerText=m.overview||"No description";
    modalRating.innerText="⭐ "+(m.vote_average||"N/A");
    movieModal.style.display="flex";
}
function closeModal(){movieModal.style.display="none";}

// ❤️ WISHLIST
function toggleWatchlist(i){
    let movie=currentMovies[i];
    let list=JSON.parse(localStorage.getItem("watchlist"))||[];

    if(list.find(m=>m.id===movie.id)){
        list=list.filter(m=>m.id!==movie.id);
        alert("Removed ❌");
    } else {
        list.push(movie);
        alert("Added ❤️");
    }

    localStorage.setItem("watchlist",JSON.stringify(list));
}

function showWatchlist(){
    let list=JSON.parse(localStorage.getItem("watchlist"))||[];
    display(list);
}

// QUIZ
function selectOption(q,s,btn){
    answers[q]=s;
    let btns=btn.parentElement.querySelectorAll("button");
    btns.forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
}

function openQuiz(){answers={};quizModal.style.display="flex";}
function closeQuiz(){quizModal.style.display="none";}

function getType(score){
    if(score<=15)return "🎧 Chill Viewer";
    if(score<=25)return "😄 Fun Explorer";
    return "🔥 Action Lover";
}

async function submitQuiz(){
    if(Object.keys(answers).length<5){
        alert("Answer all questions!");
        return;
    }

    let total=Object.values(answers).reduce((a,b)=>a+b,0);
    personalityResult.innerText="You are: "+getType(total);

    let res=await fetch(API+"/personality?score="+total);
    display(await res.json());

    setTimeout(closeQuiz,1500);
}

// SEARCH
async function scene(){
    let res=await fetch(API+"/recommend?q="+sceneInput.value);
    display(await res.json());
}

// MOOD
async function mood(type){
    let res=await fetch(API+"/mood?mood="+type);
    display(await res.json());
}

// SURPRISE
async function surprise(){
    let res=await fetch(API+"/recommend?q=random");
    display(await res.json());
}

// 🤖 AI CHAT (BACKEND BASED)
function addMsg(s,t){
    aiChatBox.innerHTML+=`<p><b>${s}:</b> ${t}</p>`;
    aiChatBox.scrollTop=aiChatBox.scrollHeight;
}

async function askAI(){
    let input=aiInput.value.toLowerCase();
    addMsg("You",input);

    if(input.includes("trending")){
        let r=await fetch(API+"/trending");
        display(await r.json());
        return;
    }

    if(input.includes("action")) display(await (await fetch(API+"/genre?id=28")).json());
    else if(input.includes("comedy")) display(await (await fetch(API+"/genre?id=35")).json());
    else if(input.includes("romance")) display(await (await fetch(API+"/genre?id=10749")).json());
    else if(input.includes("actor") || input.includes("movies of")){
        let name=input.replace("movies of","").replace("actor","").trim();
        let r=await fetch(API+"/actor?name="+name);
        display(await r.json());
    }
    else if(input.includes("like")){
        let name=input.split("like")[1].trim();
        let r=await fetch(API+"/similar?name="+name);
        display(await r.json());
    }
    else{
        let r=await fetch(API+"/recommend?q="+input);
        display(await r.json());
    }
}

</script>

</body>
</html>
