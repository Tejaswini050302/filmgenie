<!DOCTYPE html>
<html>
<head>
<title>FilmGenie 🎬</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0a0014,#140026,#1f003d);
    color:white;
}

header {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    font-size:28px;
    font-weight:bold;
    color:#c084fc;
}

.search-bar {
    text-align:center;
    margin-top:20px;
}

.search-bar input {
    width:300px;
    padding:12px;
    border-radius:20px;
    border:none;
    background:#1a1a1a;
    color:white;
}

.search-bar button {
    padding:12px 18px;
    border:none;
    background:#7b2ff7;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.filters {
    text-align:center;
    margin:20px;
}

.filters button {
    margin:5px;
    padding:10px 15px;
    background:#2a004d;
    border:none;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.results {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap:20px;
    padding:30px;
}

.card {
    background:#1e0033;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card img {
    width:100%;
    height:300px;
    object-fit:cover;
}

.card:hover {
    transform:scale(1.05);
}

.card-content {
    padding:10px;
}

.card h3 {
    color:#c084fc;
    font-size:16px;
}

.card p {
    font-size:12px;
    color:#ccc;
}

#chatBox {
    position:fixed;
    bottom:80px;
    right:20px;
    width:260px;
    background:#140026;
    padding:10px;
    border-radius:10px;
}

#chatInput {
    position:fixed;
    bottom:20px;
    right:20px;
    width:200px;
    padding:10px;
    background:#1a1a1a;
    color:white;
    border:none;
}

#chatBtn {
    position:fixed;
    bottom:20px;
    right:230px;
    background:#7b2ff7;
    border:none;
    color:white;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🎬 FilmGenie</header>

<div class="search-bar">
    <input id="sceneInput" placeholder="Search movies...">
    <button onclick="scene()">Search</button>
</div>

<div class="filters">
    <button onclick="mood('happy')">😊 Happy</button>
    <button onclick="mood('sad')">😢 Sad</button>
    <button onclick="mood('romantic')">❤️ Romantic</button>
    <button onclick="mood('action')">🔥 Action</button>
    <button onclick="surprise()">🎲 Surprise</button>
    <button onclick="showWatchlist()">❤️ My Watchlist</button>
</div>

<div id="results" class="results"></div>

<div id="chatBox"></div>
<input id="chatInput" placeholder="Ask something...">
<button id="chatBtn" onclick="chat()">Send</button>

<script>

const API = "https://filmgenie-fr1z.onrender.com";
const TMDB_API_KEY = "6701680a60181e103f2b432a7e39663c";

let currentMovies = [];

// 🎬 GET POSTER
async function getPoster(title){
    try{
        let res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}`);
        let data = await res.json();

        if(data.results && data.results.length > 0 && data.results[0].poster_path){
            return "https://image.tmdb.org/t/p/w500" + data.results[0].poster_path;
        }
    } catch(e){}

    return "https://dummyimage.com/300x450/1e0033/c084fc&text=FilmGenie";
}

// 🎬 DISPLAY
async function display(data){
    let div = document.getElementById("results");
    div.innerHTML = "";

    if(!data || data.length === 0){
        div.innerHTML = "<p>No movies found</p>";
        return;
    }

    currentMovies = data;

    for(let i = 0; i < data.length; i++){

        let m = data[i];
        let poster = await getPoster(m.title);

        div.innerHTML += `
        <div class="card">
            <img src="${poster}">
            <div class="card-content">
                <h3>${m.title}</h3>
                <p>${m.overview ? m.overview.substring(0,80) + "..." : ""}</p>
                <p>⭐ ${m.vote_average || "N/A"}</p>

                <button onclick="addToWatchlist(${i})">
                    ❤️ Save
                </button>
            </div>
        </div>`;
    }
}

// 🔍 SEARCH
async function scene(){
    let val = document.getElementById("sceneInput").value;
    let res = await fetch(API + "/recommend?q=" + val);
    display(await res.json());
}

// 🎭 MOOD
async function mood(type){
    let res = await fetch(API + "/mood?mood=" + type);
    display(await res.json());
}

// 🎲 SURPRISE
async function surprise(){
    let res = await fetch(API + "/recommend?q=random");
    display(await res.json());
}

// 🤖 CHAT
async function chat(){
    let input = document.getElementById("chatInput").value;

    let res = await fetch(API + "/recommend?q=" + input);
    let data = await res.json();

    document.getElementById("chatBox").innerHTML =
    "<b>You:</b> " + input + "<br><b>FilmGenie:</b> " +
    (data.length ? data.map(m => m.title).join(", ") : "No suggestions");
}

// ❤️ WATCHLIST
function addToWatchlist(index){
    let movie = currentMovies[index];

    let list = JSON.parse(localStorage.getItem("watchlist")) || [];

    if(!list.find(m => m.title === movie.title)){
        list.push(movie);
        localStorage.setItem("watchlist", JSON.stringify(list));
        alert("Added ❤️");
    } else {
        alert("Already saved!");
    }
}

function showWatchlist(){
    let list = JSON.parse(localStorage.getItem("watchlist")) || [];
    display(list);
}

</script>

</body>
</html>
